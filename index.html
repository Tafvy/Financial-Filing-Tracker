<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SEC Filing Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-8">
    <h1 class="text-3xl font-bold mb-6">Real-Time Filing Dashboard</h1>
    <div id="dashboard" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        </div>

    <script>
        fetch('./data.json')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('dashboard');
                data.forEach(item => {
                    const card = `
                        <div class="p-4 bg-gray-800 rounded-lg border border-gray-700">
                            <span class="text-blue-400 font-bold">${item.ticker}</span>
                            <h2 class="text-xl font-semibold">${item.form}</h2>
                            <p class="text-gray-400 text-sm">Filed on: ${item.date}</p>
                            <a href="${item.url}" target="_blank" class="mt-4 inline-block text-xs bg-blue-600 px-3 py-1 rounded">View Filing</a>
                        </div>`;
                    container.innerHTML += card;
                });
            });
    </script>
</body>
</html>
